<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Podcasts">
<meta name="theme-color" id="theme-color-meta" content="#121212">
<link rel="manifest" href="app.webmanifest">
<title>Podcast Library</title>
<link rel="stylesheet" href="style.css">
<link id="hljs-theme" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark-dimmed.min.css">
</head>
<body>

<div class="site-header">
  <div class="topbar">
    <button id="btn-back" class="btn-back" hidden>&#8592; Library</button>
    <div class="brand">Podcast Library</div>
    <button id="btn-sleep" class="sleep-btn" hidden aria-label="Sleep timer"></button>
    <button id="btn-stats" class="icon-btn" aria-label="Listening stats">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><rect x="2" y="12" width="4" height="10" rx="1"/><rect x="9" y="7" width="4" height="15" rx="1"/><rect x="16" y="2" width="4" height="20" rx="1"/></svg>
    </button>
    <button id="btn-queue" class="icon-btn queue-btn" aria-label="Playback queue" hidden>
      <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg>
      <span id="queue-badge" class="queue-badge"></span>
    </button>
    <button id="btn-theme" class="theme-toggle" aria-label="Toggle theme">
      <svg class="icon-sun" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v3M12 19v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M2 12h3M19 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1"/></svg>
      <svg class="icon-moon" viewBox="0 0 24 24" width="20" height="20" fill="currentColor" hidden><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
    </button>
  </div>

  <div id="player-bar" class="player-bar" hidden>
    <div class="player-controls">
      <button id="btn-rewind" class="ctrl-btn" aria-label="Back 30 seconds">&#8722;30</button>
      <button id="btn-play" class="ctrl-btn ctrl-play play-btn" aria-label="Play/Pause">
        <svg class="icon-play" viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        <svg class="icon-pause" viewBox="0 0 24 24" width="20" height="20" fill="currentColor" hidden><path d="M7 5h4v14H7zM13 5h4v14h-4z"/></svg>
      </button>
      <button id="btn-forward" class="ctrl-btn" aria-label="Forward 30 seconds">+30</button>
      <input id="progress-bar" class="progress-bar" type="range" min="0" max="1" step="0.001" value="0">
      <span class="player-time"><span id="time-current">0:00</span> / <span id="time-total">0:00</span></span>
    </div>
    <div class="player-meta">
      <div class="player-selects">
        <select id="voice-select" class="meta-select" aria-label="Voice"></select>
        <div class="speed-control">
          <button id="btn-speed-down" class="speed-arrow" aria-label="Decrease speed">&#8722;</button>
          <input id="speed-slider" class="speed-slider" type="range" min="0" max="62" step="1" value="3">
          <button id="btn-speed-up" class="speed-arrow" aria-label="Increase speed">+</button>
          <input id="speed-input" class="speed-input" type="text" value="1x" aria-label="Playback speed" inputmode="decimal">
        </div>
      </div>
    </div>
  </div>
</div>

<audio id="audio" preload="metadata"></audio>

<main id="view-library" class="view"></main>

<main id="view-episode" class="view" hidden>
  <h2 id="episode-title" class="episode-heading"></h2>
  <div class="tabs">
    <button class="tab-btn" data-tab="script">Script</button>
    <button class="tab-btn active" data-tab="supplementary">References</button>
    <button class="tab-btn" data-tab="quiz">Quiz</button>
  </div>
  <article id="episode-content" class="markdown-body"></article>
  <div id="quiz-area" hidden></div>
</main>

<div id="advance-toast" class="advance-toast" hidden>
  <div class="advance-info">
    <span class="advance-label">Up next</span>
    <span id="advance-title" class="advance-title"></span>
  </div>
  <div class="advance-actions">
    <span id="advance-countdown" class="advance-countdown">3</span>
    <button id="btn-advance-cancel" class="advance-cancel">Cancel</button>
  </div>
</div>

<div id="stats-overlay" class="stats-overlay" hidden>
  <div class="stats-panel">
    <div class="stats-header">
      <h2 class="stats-heading">Listening Stats</h2>
      <button id="btn-stats-close" class="stats-close">&#10005;</button>
    </div>
    <div id="stats-content" class="stats-content"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="speed-engine.js"></script>
<script src="app.js"></script>
</body>
</html>
